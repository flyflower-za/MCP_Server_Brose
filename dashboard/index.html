<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Servers Hub — Dashboard</title>
  <meta name="description" content="MCP Servers Hub 可视化管理控制台 — 实时监控、固定端口配置、启停控制" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:        #ffffff;
      --bg-surface:     #f8fafc;
      --bg-glass:       rgba(255,255,255,0.8);
      --bg-glass-hover: rgba(241,245,249,0.95);
      --border:         #e2e8f0;
      --border-light:   #cbd5e1;

      --accent-blue:   #2563eb;
      --accent-cyan:   #0891b2;
      --accent-purple: #7c3aed;
      --accent-green:  #059669;
      --accent-orange: #d97706;
      --accent-red:    #dc2626;

      --text-primary:  #1e293b;
      --text-secondary:#64748b;
      --text-muted:    #94a3b8;

      --radius-sm: 8px; --radius-md: 12px;
      --radius-lg: 16px; --radius-xl: 24px;

      --shadow-glow-blue:  0 0 40px rgba(37,99,235,0.12);
      --shadow-glow-green: 0 0 30px rgba(5,150,105,0.15);
      --shadow-card:       0 2px 12px rgba(0,0,0,0.08);
      --shadow-card-hover: 0 4px 20px rgba(0,0,0,0.12);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37,99,235,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(124,58,237,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 50%, rgba(8,145,178,0.02) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 0 28px 80px; }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: var(--shadow-card); border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .header-title h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-title p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .hub-url {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--text-secondary); background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px;
    }
    .refresh-btn {
      width: 36px; height: 36px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .refresh-btn:hover { background: var(--bg-glass-hover); color: var(--accent-blue); border-color: var(--accent-blue); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STAT CARDS ── */
    .status-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
      transition: all var(--transition); position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .stat-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity var(--transition); }
    .stat-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.blue::before  { background: linear-gradient(135deg, rgba(37,99,235,0.03), transparent); }
    .stat-card.green::before { background: linear-gradient(135deg, rgba(5,150,105,0.03), transparent); }
    .stat-card.purple::before{ background: linear-gradient(135deg, rgba(124,58,237,0.03), transparent); }
    .stat-card.cyan::before  { background: linear-gradient(135deg, rgba(8,145,178,0.03), transparent); }
    .stat-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .stat-icon.blue   { background: rgba(59,130,246,0.15); }
    .stat-icon.green  { background: rgba(16,185,129,0.15); }
    .stat-icon.purple { background: rgba(139,92,246,0.15); }
    .stat-icon.cyan   { background: rgba(6,182,212,0.15); }
    .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-value.blue   { color: var(--accent-blue); }
    .stat-value.green  { color: var(--accent-green); }
    .stat-value.purple { color: var(--accent-purple); }
    .stat-value.cyan   { color: var(--accent-cyan); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── GLOBAL ACTIONS ── */
    .global-actions {
      display: flex; gap: 10px; padding: 14px 20px;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 24px; align-items: center;
      box-shadow: var(--shadow-card);
    }
    .global-actions-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }

    /* ── MAIN GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr 390px; gap: 24px; align-items: start; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); }

    /* ── SERVER CARD ── */
    .server-card {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 16px;
      transition: all var(--transition); position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .server-card:hover { border-color: var(--accent-blue); box-shadow: var(--shadow-card-hover); }
    .server-card.running { border-color: rgba(5,150,105,0.3); background: linear-gradient(135deg, #ffffff 0%, rgba(5,150,105,0.02) 100%); }
    .server-card.stopped, .server-card.not_running { border-color: rgba(220,38,38,0.2); background: linear-gradient(135deg, #ffffff 0%, rgba(220,38,38,0.02) 100%); }

    /* 折叠状态 */
    .server-card.collapsed .server-content {
      display: none;
    }
    .server-card.collapsed {
      padding: 16px 20px;
    }
    .server-card:not(.collapsed) {
      padding: 24px;
    }

    .server-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .server-card:not(.collapsed) .server-top {
      margin-bottom: 18px;
    }
    .server-card.collapsed .server-top {
      margin-bottom: 0;
    }
    .server-card.collapsed .server-desc {
      display: none;
    }
    .server-card.collapsed .server-module {
      display: none;
    }

    /* 折叠状态摘要 */
    .collapsed-summary {
      display: none;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .server-card.collapsed .collapsed-summary {
      display: flex;
      gap: 12px;
    }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .summary-item span:first-child {
      color: var(--text-muted);
    }
    .summary-item span:last-child {
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }

    /* 折叠指示器 */
    .collapse-indicator {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      color: var(--text-muted);
      font-size: 14px;
      flex-shrink: 0;
    }
    .server-card.collapsed .collapse-indicator {
      transform: rotate(-90deg);
    }
    .collapse-indicator:hover {
      background: var(--bg-surface);
      color: var(--accent-blue);
    }

    /* 可折叠内容区域 */
    .server-content {
      transition: all var(--transition);
    }
    .server-info { display: flex; align-items: center; gap: 14px; }
    .server-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
      border: 1px solid rgba(37,99,235,0.2); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .server-name { font-size: 16px; font-weight: 600; }
    .server-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .server-module { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-cyan); margin-top: 4px; opacity: 0.8; }

    .status-badge {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-radius: 999px; font-size: 12px; font-weight: 500; flex-shrink: 0;
    }
    .status-badge.running { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); color: var(--accent-green); }
    .status-badge.stopped, .status-badge.not_running { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); color: var(--accent-red); }

    .pulse { width: 8px; height: 8px; border-radius: 50%; position: relative; flex-shrink: 0; }
    .pulse.green { background: var(--accent-green); }
    .pulse.red   { background: var(--accent-red); }
    .pulse.green::after {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: var(--accent-green); animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.2); opacity: 0; } }

    /* ── SERVER META ── */
    .server-meta {
      display: flex; gap: 0; margin-bottom: 18px;
      background: var(--bg-surface); border-radius: var(--radius-sm);
      border: 1px solid var(--border); overflow: hidden;
    }
    .meta-item {
      flex: 1; padding: 10px 14px;
      border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px;
    }
    .meta-item:last-child { border-right: none; }
    .meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); }
    .meta-value.highlight { color: var(--accent-cyan); }

    /* ── API ENDPOINTS ── */
    .api-endpoints {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .api-endpoints-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .api-endpoint-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .api-endpoint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    .api-endpoint-item:hover {
      background: rgba(37,99,235,0.03);
      border-color: rgba(37,99,235,0.2);
    }
    .api-method {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .api-method.get { background: rgba(5,150,105,0.1); color: var(--accent-green); }
    .api-method.post { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
    .api-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      flex: 1;
      word-break: break-all;
    }
    .api-copy-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
      font-size: 12px;
    }
    .api-copy-btn:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: white;
    }
    .api-status-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 999px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .api-status-badge.active {
      background: rgba(5,150,105,0.1);
      color: var(--accent-green);
      border: 1px solid rgba(5,150,105,0.3);
    }
    .api-status-badge.inactive {
      background: rgba(220,38,38,0.08);
      color: var(--accent-red);
      border: 1px solid rgba(220,38,38,0.25);
    }

    /* ── PORT CONFIG ROW ── */
    .port-config-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
      padding: 12px 16px;
      background: rgba(37,99,235,0.04);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: var(--radius-sm);
    }
    .port-config-label {
      font-size: 12px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0;
    }
    .port-mode-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    }
    .port-mode-badge.fixed   { background: rgba(5,150,105,0.1); color: var(--accent-green); border: 1px solid rgba(5,150,105,0.3); }
    .port-mode-badge.dynamic { background: rgba(217,119,6,0.1); color: var(--accent-orange); border: 1px solid rgba(217,119,6,0.3); }

    .port-input-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .port-input {
      width: 90px; background: #ffffff; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
      padding: 6px 10px; text-align: center; transition: all var(--transition);
    }
    .port-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .port-input::placeholder { color: var(--text-muted); font-size: 11px; }

    .port-hint {
      font-size: 11px; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace; white-space: nowrap;
    }

    /* ── SERVER ACTIONS ── */
    .server-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; transition: all var(--transition);
      white-space: nowrap; font-family: 'Inter', sans-serif;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-start   { background: rgba(5,150,105,0.1);  border-color: rgba(5,150,105,0.3);  color: var(--accent-green); }
    .btn-start:hover { background: rgba(5,150,105,0.2); border-color: rgba(5,150,105,0.5); }
    .btn-stop    { background: rgba(220,38,38,0.08);    border-color: rgba(220,38,38,0.25);    color: var(--accent-red); }
    .btn-stop:hover  { background: rgba(220,38,38,0.15);  border-color: rgba(220,38,38,0.4); }
    .btn-restart { background: rgba(217,119,6,0.08);   border-color: rgba(217,119,6,0.25);   color: var(--accent-orange); }
    .btn-restart:hover{ background: rgba(217,119,6,0.15); border-color: rgba(217,119,6,0.4); }
    .btn-port-save { background: rgba(37,99,235,0.1); border-color: rgba(37,99,235,0.3); color: var(--accent-blue); padding: 6px 14px; }
    .btn-port-save:hover { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.5); }
    .btn-port-clear { background: transparent; border-color: var(--border); color: var(--text-secondary); padding: 6px 10px; font-size: 12px; }
    .btn-port-clear:hover { color: var(--accent-red); border-color: rgba(220,38,38,0.3); background: rgba(220,38,38,0.06); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-color: transparent; color: white;
      box-shadow: 0 2px 8px rgba(37,99,235,0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    .btn-ghost { background: #ffffff; border-color: var(--border); color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--bg-surface); border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    /* ── PANEL ── */
    .panel {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card);
      transition: all var(--transition);
    }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-surface);
      cursor: pointer;
      user-select: none;
    }
    .panel-header:hover {
      background: rgba(37,99,235,0.03);
    }
    .panel-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 20px; }

    /* 折叠面板 */
    .panel.collapsed .panel-body {
      display: none;
    }
    .panel.collapsed .panel-header {
      border-bottom: none;
      padding: 12px 20px;
    }
    .panel.collapsed {
      opacity: 0.85;
    }
    .panel.collapsed:hover {
      opacity: 1;
    }

    /* 面板折叠指示器 */
    .panel-collapse-indicator {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      color: var(--text-muted);
      font-size: 12px;
      flex-shrink: 0;
    }
    .panel.collapsed .panel-collapse-indicator {
      transform: rotate(-90deg);
    }
    .panel-collapse-indicator:hover {
      background: rgba(37,99,235,0.1);
      color: var(--accent-blue);
    }

    /* ── PDF TESTER ── */
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .input-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .input-field {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 14px;
      transition: all var(--transition); width: 100%;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }

    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .checkbox-group input { accent-color: var(--accent-blue); width: 14px; height: 14px; }
    .checkbox-group label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }

    .result-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-secondary); max-height: 220px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all; line-height: 1.6; display: none;
    }
    .result-box.visible { display: block; }
    .result-box.success { border-color: rgba(5,150,105,0.3); color: var(--accent-green); background: rgba(5,150,105,0.03); }
    .result-box.error   { border-color: rgba(220,38,38,0.3);  color: var(--accent-red); background: rgba(220,38,38,0.03); }

    /* ── LOG ── */
    .log-container {
      background: var(--bg-surface); border: none; border-radius: 0;
      max-height: 280px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7;
      margin: 0;
    }
    .log-line {
      padding: 3px 14px; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: baseline;
    }
    .log-line:last-child { border-bottom: none; }
    .log-time  { color: var(--text-muted); flex-shrink: 0; font-size: 10px; }
    .log-level { flex-shrink: 0; font-size: 10px; font-weight: 600; width: 46px; }
    .log-level.INFO    { color: var(--accent-blue); }
    .log-level.WARNING { color: var(--accent-orange); }
    .log-level.ERROR   { color: var(--accent-red); }
    .log-level.SUCCESS { color: var(--accent-green); }
    .log-msg { color: var(--text-secondary); word-break: break-all; }

    /* ── HEALTH ── */
    .health-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; position: relative; flex-shrink: 0;
      background: #ffffff;
    }
    .health-ring.healthy { border-color: rgba(5,150,105,0.4); box-shadow: 0 0 12px rgba(5,150,105,0.15); }
    .health-ring.offline  { border-color: rgba(220,38,38,0.3); }

    /* ── TOAST ── */
    #toast-container { position: fixed; bottom: 28px; right: 28px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      font-size: 13px; font-weight: 500;
      animation: toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; max-width: 320px;
    }
    .toast.success { border-color: rgba(5,150,105,0.3); color: var(--accent-green); background: rgba(5,150,105,0.03); }
    .toast.error   { border-color: rgba(220,38,38,0.3);  color: var(--accent-red); background: rgba(220,38,38,0.03); }
    .toast.info    { border-color: rgba(37,99,235,0.3);  color: var(--accent-blue); background: rgba(37,99,235,0.03); }
    .toast.warning { border-color: rgba(217,119,6,0.3); color: var(--accent-orange); background: rgba(217,119,6,0.03); }
    @keyframes toast-in  { from { opacity:0; transform:translateX(20px) scale(0.95); } to { opacity:1; transform:translateX(0) scale(1); } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateX(20px); } }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 13px; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { flex-direction: row; flex-wrap: wrap; }
      .sidebar > * { flex: 1 1 320px; }
    }
    @media (max-width: 700px) {
      .status-bar { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    }

    /* ── PERFORMANCE GRID ── */
    .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .perf-item {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .perf-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .perf-value { font-size: 14px; font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }

    /* ── CONFIG LIST ── */
    .config-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 12px; transition: background var(--transition);
    }
    .config-item:last-child { border-bottom: none; }
    .config-item:hover { background: var(--bg-surface); }
    .config-info { display: flex; flex-direction: column; gap: 2px; }
    .config-name { font-weight: 500; color: var(--text-primary); }
    .config-id { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .config-actions { display: flex; gap: 6px; }
    .config-btn {
      padding: 4px 8px; font-size: 10px; border-radius: 4px;
      border: 1px solid var(--border); background: #ffffff;
      cursor: pointer; transition: all var(--transition);
    }
    .config-btn:hover { background: var(--bg-surface); border-color: var(--accent-blue); }
    .config-btn.toggle { width: 32px; text-align: center; }
    .config-btn.toggle.active { background: rgba(5,150,105,0.1); border-color: rgba(5,150,105,0.3); color: var(--accent-green); }
    .config-btn.toggle.inactive { background: rgba(220,38,38,0.08); border-color: rgba(220,38,38,0.25); color: var(--accent-red); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; opacity: 0; pointer-events: none; transition: opacity var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal {
      background: #ffffff; border-radius: var(--radius-lg);
      width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); transform: scale(0.95);
      transition: transform var(--transition);
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: #ffffff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .modal-close:hover { background: var(--bg-surface); border-color: var(--accent-red); color: var(--accent-red); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }

    /* ── TEST CENTER ── */
    .test-tabs {
      display: flex;
      gap: 4px;
      padding: 8px;
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .test-tab {
      padding: 8px 14px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .test-tab:hover {
      background: rgba(37,99,235,0.08);
      color: var(--accent-blue);
    }
    .test-tab.active {
      background: rgba(37,99,235,0.12);
      border-color: rgba(37,99,235,0.3);
      color: var(--accent-blue);
    }
    .test-tab-content {
      display: none;
    }
    .test-tab-content.active {
      display: block;
    }
    .test-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .test-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .test-form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .test-form-input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      transition: all var(--transition);
    }
    .test-form-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .test-form-input[type="url"] {
      font-family: 'JetBrains Mono', monospace;
    }
    .test-success-content {
      background: rgba(5,150,105,0.08);
      border: 1px solid rgba(5,150,105,0.25);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-top: 12px;
    }
    .test-success-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--accent-green);
      font-weight: 600;
      font-size: 13px;
    }
    .test-error-content {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.25);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-top: 12px;
    }
    .test-error-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--accent-red);
      font-weight: 600;
      font-size: 13px;
    }
    .test-result-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .test-result-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #ffffff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all var(--transition);
    }
    .test-result-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">🚀</div>
      <div class="header-title">
        <h1>MCP Servers Hub</h1>
        <p>进程隔离架构 · 可视化管理控制台</p>
      </div>
    </div>
    <div class="header-right">
      <span class="hub-url" id="hub-url">正在检测…</span>

      <!-- User Info (shown when logged in) -->
      <div id="user-info" style="display:none;align-items:center;gap:8px;">
        <span style="font-size:12px;color:var(--text-secondary);">
          👤 <span id="username-display">admin</span>
        </span>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="performLogout()">退出</button>
      </div>

      <button class="refresh-btn" id="refresh-btn" title="手动刷新" onclick="refreshAll()">
        <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- STAT CARDS -->
  <section class="status-bar">
    <div class="stat-card blue">
      <div class="stat-icon blue">🌐</div>
      <div>
        <div class="stat-value blue" id="stat-hub">—</div>
        <div class="stat-label">Hub 状态</div>
      </div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon green">⚙️</div>
      <div>
        <div class="stat-value green" id="stat-running">—</div>
        <div class="stat-label">运行中服务</div>
      </div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon purple">📦</div>
      <div>
        <div class="stat-value purple" id="stat-total">—</div>
        <div class="stat-label">已注册服务</div>
      </div>
    </div>
    <div class="stat-card cyan">
      <div class="stat-icon cyan">⏱️</div>
      <div>
        <div class="stat-value cyan" id="stat-uptime" style="font-size:20px;font-family:'JetBrains Mono',monospace">—</div>
        <div class="stat-label">页面监控时长</div>
      </div>
    </div>
  </section>

  <!-- GLOBAL ACTIONS -->
  <div class="global-actions">
    <span class="global-actions-label">全局操作：</span>
    <button class="btn btn-start" onclick="startAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 启动全部
    </button>
    <button class="btn btn-stop" onclick="stopAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 停止全部
    </button>
    <button class="btn btn-ghost" onclick="expandAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
      展开全部
    </button>
    <button class="btn btn-ghost" onclick="collapseAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="18 15 12 9 6 15"/></svg>
      折叠卡片
    </button>
    <button class="btn btn-ghost" onclick="collapseAllPanels()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      折叠面板
    </button>
    <button class="btn btn-ghost" onclick="expandAllPanels()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="4" y="4" width="16" height="16" rx="2" style="fill:rgba(37,99,235,0.1)"/></svg>
      展开面板
    </button>
    <button class="btn btn-ghost" onclick="resetLayout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      重置布局
    </button>
    <button class="btn btn-ghost" onclick="exportConfig()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      导出配置
    </button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
      <span style="font-size:11px;color:var(--text-muted);">
        版本 <span style="color:var(--accent-cyan);font-family:'JetBrains Mono',monospace;">v1.0.0</span>
      </span>
      <span style="font-size:11px; color:var(--text-muted)">
        自动刷新 <span id="auto-refresh-countdown" style="color:var(--accent-cyan);font-family:'JetBrains Mono',monospace;">15s</span>
      </span>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- SERVER LIST -->
    <div>
      <div class="section-header">
        <div class="section-title"><span class="dot"></span>MCP 服务器</div>
      </div>

      <!-- 搜索和过滤 -->
      <div style="display:flex;gap:10px;margin-bottom:16px;">
        <input
          id="search-input"
          type="text"
          placeholder="搜索服务器名称、模块..."
          style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;"
          oninput="filterServers()"
        />
        <select
          id="status-filter"
          style="padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:#ffffff;"
          onchange="filterServers()"
        >
          <option value="all">全部状态</option>
          <option value="running">运行中</option>
          <option value="stopped">已停止</option>
        </select>
      </div>

      <div id="servers-container">
        <div class="empty-state"><div class="icon">⏳</div><div>正在连接到 Hub…</div></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- 🆕 UNIFIED TEST CENTER (优化后的设计) -->
      <div class="panel" id="panel-test-center">
        <div class="panel-header" onclick="togglePanel('panel-test-center')">
          <div class="panel-title"><span>🧪</span> 测试中心</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="test-services-count" style="font-size:10px;padding:3px 8px;border-radius:999px;background:var(--accent-blue);color:white;">3服务</span>
            <div class="panel-collapse-indicator" title="点击展开/折叠">▼</div>
          </div>
        </div>
        <div class="panel-body">
          <!-- 选项卡导航 -->
          <div class="test-tabs" id="test-tabs">
            <!-- 动态生成 -->
          </div>

          <!-- 选项卡内容 -->
          <div id="test-tab-content">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- CONFIG MANAGER -->
      <div class="panel" id="panel-config-manager">
        <div class="panel-header" onclick="togglePanel('panel-config-manager')">
          <div class="panel-title"><span>⚙️</span> 配置管理</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="event.stopPropagation();showConfigModal()">+ 添加</button>
            <div class="panel-collapse-indicator" title="点击展开/折叠">▼</div>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div id="config-list" style="max-height:200px;overflow-y:auto;">
            <!-- 配置列表将在这里渲染 -->
          </div>
        </div>
      </div>

      <!-- PERFORMANCE -->
      <div class="panel" id="panel-performance">
        <div class="panel-header" onclick="togglePanel('panel-performance')">
          <div class="panel-title"><span>📊</span> 性能监控</div>
          <div class="panel-collapse-indicator" title="点击展开/折叠">▼</div>
        </div>
        <div class="panel-body">
          <div class="perf-grid">
            <div class="perf-item">
              <span class="perf-label">Hub CPU</span>
              <span class="perf-value" id="perf-cpu">—%</span>
            </div>
            <div class="perf-item">
              <span class="perf-label">Hub 内存</span>
              <span class="perf-value" id="perf-memory">— MB</span>
            </div>
            <div class="perf-item">
              <span class="perf-label">端口池</span>
              <span class="perf-value" id="perf-ports">—/—</span>
            </div>
            <div class="perf-item">
              <span class="perf-label">运行进程</span>
              <span class="perf-value" id="perf-processes">—/—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- HEALTH -->
      <div class="panel" id="panel-health">
        <div class="panel-header" onclick="togglePanel('panel-health')">
          <div class="panel-title"><span>💓</span> Hub 健康状态</div>
          <div class="panel-collapse-indicator" title="点击展开/折叠">▼</div>
        </div>
        <div class="panel-body">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
            <div class="health-ring" id="health-ring">🔌</div>
            <div>
              <div style="font-size:14px;font-weight:600;" id="health-status-text">连接中…</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px;" id="health-version">—</div>
            </div>
          </div>
          <div id="health-detail" style="font-size:12px;color:var(--text-muted);line-height:1.8;"></div>
        </div>
      </div>

      <!-- LOG -->
      <div class="panel" id="panel-log">
        <div class="panel-header" onclick="togglePanel('panel-log')">
          <div class="panel-title"><span>📋</span> 操作日志</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="event.stopPropagation();clearLogs()">清空</button>
            <div class="panel-collapse-indicator" title="点击展开/折叠">▼</div>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="log-container" id="log-container"></div>
        </div>
      </div>

    </aside>
  </div>
</div>

<!-- CONFIG MODAL -->
<div id="config-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">添加服务器</div>
      <button class="modal-close" onclick="closeConfigModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="config-form">
        <input type="hidden" id="config-edit-mode" value="add" />
        <div class="input-group">
          <label class="input-label">服务器 ID *</label>
          <input id="config-id" class="input-field" type="text" placeholder="如: web_scraper" required />
        </div>
        <div class="input-group">
          <label class="input-label">服务器名称 *</label>
          <input id="config-name" class="input-field" type="text" placeholder="如: Web Scraper" required />
        </div>
        <div class="input-group">
          <label class="input-label">描述</label>
          <input id="config-desc" class="input-field" type="text" placeholder="服务器功能描述" />
        </div>
        <div class="input-group">
          <label class="input-label">Python 模块路径 *</label>
          <input id="config-module" class="input-field" type="text" placeholder="如: mcp_servers.web_scraper.server" required />
        </div>
        <div class="input-group">
          <label class="input-label">URL 前缀</label>
          <input id="config-prefix" class="input-field" type="text" placeholder="如: /scraper" />
        </div>
        <div class="input-group">
          <label class="input-label">标签（逗号分隔）</label>

// ── utils ──────────────────────────────────────
function formatUptime(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ── toast ──────────────────────────────────────
function toast(msg, type = 'info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toast-out 0.3s ease forwards';
    setTimeout(() => el.remove(), 310);
  }, 3500);
}

// ── log ────────────────────────────────────────
function addLog(msg, level = 'INFO') {
  const c = document.getElementById('log-container');
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${t}</span><span class="log-level ${level}">${level}</span><span class="log-msg">${msg}</span>`;
  c.appendChild(line);
  c.scrollTop = c.scrollHeight;
  while (c.children.length > 120) c.removeChild(c.firstChild);
}
function clearLogs() { document.getElementById('log-container').innerHTML = ''; addLog('日志已清空'); }

// ── api ────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };

  // 添加认证 Token
  if (authToken) {
    opts.headers['Authorization'] = `Bearer ${authToken}`;
  }

  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${HUB_BASE}${path}`, opts);

  // 处理 401 未授权 - 但在认证禁用时不自动登出
  if (res.status === 401) {
    // 只有在认证启用且已登录时才自动登出
    if (authEnabled && authToken) {
      logout();
      throw new Error('登录已过期，请重新登录');
    } else {
      throw new Error('未授权，请先登录');
    }
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── authentication ─────────────────────────────
function checkAuth() {
  // 如果认证被禁用，直接返回true
  if (!authEnabled) {
    return true;
  }

  if (authToken && currentUsername) {
    // 已登录
    const userInfoEl = document.getElementById('user-info');
    if (userInfoEl) {
      userInfoEl.style.display = 'flex';
    }
    const usernameDisplayEl = document.getElementById('username-display');
    if (usernameDisplayEl) {
      usernameDisplayEl.textContent = currentUsername;
    }
    return true;
  } else {
    // 未登录，显示登录框
    const loginModalEl = document.getElementById('login-modal');
    if (loginModalEl) {
      loginModalEl.classList.add('active');
    }
    return false;
  }
}

async function performLogin() {
  const usernameEl = document.getElementById('login-username');
  const passwordEl = document.getElementById('login-password');
  const rememberEl = document.getElementById('login-remember');
  const errorDiv = document.getElementById('login-error');

  if (!usernameEl || !passwordEl) {
    console.error('登录表单元素未找到');
    return;
  }

  const username = usernameEl.value.trim();
  const password = passwordEl.value;
  const remember = rememberEl ? rememberEl.checked : false;

  if (!username || !password) {
    if (errorDiv) {
      errorDiv.textContent = '请输入用户名和密码';
      errorDiv.style.display = 'block';
    }
    return;
  }

  try {
    const d = await fetch(`${HUB_BASE}/api/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!d.ok) {
      const err = await d.json().catch(() => ({}));
      throw new Error(err.detail || '登录失败');
    }

    const data = await d.json();
    authToken = data.access_token;
    currentUsername = username;

    // 保存到 localStorage
    if (remember) {
      localStorage.setItem('mcp_hub_token', authToken);
      localStorage.setItem('mcp_hub_username', username);
    }

    // 更新 UI
    const loginModalEl = document.getElementById('login-modal');
    if (loginModalEl) {
      loginModalEl.classList.remove('active');
    }

    const userInfoEl = document.getElementById('user-info');
    if (userInfoEl) {
      userInfoEl.style.display = 'flex';
    }

    const usernameDisplayEl = document.getElementById('username-display');
    if (usernameDisplayEl) {
      usernameDisplayEl.textContent = username;
    }

    if (errorDiv) {
      errorDiv.style.display = 'none';
    }

    // 清空表单
    const loginFormEl = document.getElementById('login-form');
    if (loginFormEl) {
      loginFormEl.reset();
    }

    addLog(`用户 ${username} 已登录`, 'SUCCESS');
    toast('登录成功', 'success');

    // 延迟加载数据，确保 token 完全生效
    setTimeout(() => {
      refreshAll();
    }, 500);
  } catch(e) {
    if (errorDiv) {
      errorDiv.textContent = e.message;
      errorDiv.style.display = 'block';
    }
    toast('登录失败: ' + e.message, 'error');
  }
}

function performLogout() {
  authToken = null;
  currentUsername = null;
  localStorage.removeItem('mcp_hub_token');
  localStorage.removeItem('mcp_hub_username');

  const userInfoEl = document.getElementById('user-info');
  if (userInfoEl) {
    userInfoEl.style.display = 'none';
  }

  const loginModalEl = document.getElementById('login-modal');
  if (loginModalEl) {
    loginModalEl.classList.add('active');
  }

  addLog('用户已退出登录', 'INFO');
  toast('已退出登录', 'info');
}

function logout() {
  performLogout();
}

      api('/api/v1/servers/port-configs'),

      merged[srv.id] = {

        portConfig: portConfData[srv.id] || { mode: 'dynamic', fixed_port: null },

    document.getElementById('servers-container').innerHTML = `

// ── render ─────────────────────────────────────
function renderServers() {
  const container = document.getElementById('servers-container');
  if (!Object.keys(servers).length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>暂无已注册的 MCP 服务器</div></div>`;
    updateStats(0, 0); return;
  }

  // 获取过滤条件
  const searchText = document.getElementById('search-input').value.toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;

  let running = 0;
  let displayed = 0;
  const total = Object.keys(servers).length;
  container.innerHTML = '';

  for (const [id, data] of Object.entries(servers)) {
    if (data.status?.status === 'running') running++;
    if (id === 'pdf_extractor') pdfOnline = data.status?.status === 'running';
    if (id === 'qrcode_reader') qrcodeOnline = data.status?.status === 'running';

    // 应用过滤条件
    const matchesSearch = (
      searchText === '' ||
      (data.config?.name || '').toLowerCase().includes(searchText) ||
      (data.config?.module || '').toLowerCase().includes(searchText) ||
      (data.config?.description || '').toLowerCase().includes(searchText) ||
      id.toLowerCase().includes(searchText)
    );

    const matchesStatus = (
      statusFilter === 'all' ||
      (statusFilter === 'running' && data.status?.status === 'running') ||
      (statusFilter === 'stopped' && data.status?.status !== 'running')
    );

    if (matchesSearch && matchesStatus) {
      container.appendChild(buildCard(id, data));
      displayed++;
    }
  }

  // 如果没有匹配的结果
  if (displayed === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>没有找到匹配的服务器</div></div>`;
  }

  updateStats(running, total);
  updatePDFBadge();
  updateQRCodeBadge();
  updateSignatureBadge();

  // 恢复折叠状态（延迟执行以确保DOM已更新）
  setTimeout(restoreCollapseState, 50);
}

    localStorage.setItem('mcp_collapsed_servers', JSON.stringify(collapsedState));

}

function expandAll() {
  const cards = document.querySelectorAll('.server-card');

function collapseAll() {
  const cards = document.querySelectorAll('.server-card');

}

// ── restore collapse state ─────────────────────
function restoreCollapseState() {
  const collapsedState = JSON.parse(localStorage.getItem('mcp_collapsed_servers') || '{}');

  // 如果没有保存的状态，应用默认折叠状态
  const hasSavedState = Object.keys(collapsedState).length > 0;

  const cards = document.querySelectorAll('.server-card');
  cards.forEach(card => {
    const id = card.id.replace('card-', '');
    const shouldCollapse = hasSavedState ? collapsedState[id] : true; // 默认折叠

    if (shouldCollapse) {
      card.classList.add('collapsed');
    } else {
      card.classList.remove('collapsed');
    }
  });
}

// ── reset layout to default ─────────────────────
function resetLayout() {
  if (!confirm('确定要重置为默认布局吗？所有自定义的折叠状态将被清除。')) {
    return;
  }

  // 清除所有折叠状态
  localStorage.removeItem('mcp_collapsed_panels');
  localStorage.removeItem('mcp_collapsed_servers');

  // 重置服务器卡片 - 全部折叠
  const cards = document.querySelectorAll('.server-card');
  cards.forEach(card => {
    card.classList.add('collapsed');
  });

  // 重置面板 - 应用默认状态
  const defaultCollapsedPanels = [
    'panel-log',            // 操作日志 - 折叠
    'panel-config-manager', // 配置管理 - 折叠
    'panel-performance',    // 性能监控 - 折叠
    'panel-health',         // 健康状态 - 折叠
    'panel-pdf-tester',     // PDF测试 - 折叠
    'panel-qrcode-tester'   // 二维码测试 - 折叠
  ];

  const panels = document.querySelectorAll('.panel');
  panels.forEach(panel => {
    if (defaultCollapsedPanels.includes(panel.id)) {
      panel.classList.add('collapsed');
    } else {
      panel.classList.remove('collapsed');
    }
  });

  addLog('已重置为默认布局', 'SUCCESS');
  toast('布局已重置', 'success');

  // 刷新页面以确保状态完全重置
  setTimeout(() => {
    location.reload();
  }, 1000);
}

// ── restore panel state ────────────────────────
function restorePanelState() {
  const panelState = JSON.parse(localStorage.getItem('mcp_collapsed_panels') || '{}');
  for (const [panelId, isCollapsed] of Object.entries(panelState)) {
    const panel = document.getElementById(panelId);
    if (panel && isCollapsed) {
      panel.classList.add('collapsed');
    }
  }
}

function buildCard(id, { config, status, portConfig }) {
  const isRunning    = status?.status === 'running';
  const statusClass  = status?.status || 'not_running';
  const badgeLabel   = isRunning ? '运行中' : (status?.status === 'stopped' ? '已停止' : '未运行');
  const pid     = status?.pid     ?? status?.last_info?.pid     ?? '—';
  const port    = status?.port    ?? status?.last_info?.port    ?? '—';
  const uptime  = status?.uptime_seconds != null ? formatUptime(status.uptime_seconds) : '—';
  const restarts = status?.restart_count ?? status?.last_info?.restart_count ?? '—';

  const isFixed    = portConfig?.mode === 'fixed';
  const fixedPort  = portConfig?.fixed_port;

  const card = document.createElement('div');
  card.className = `server-card ${statusClass}`; // 初始状态，稍后会根据用户偏好设置
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="server-top" onclick="toggleCollapse('${id}')">
      <div class="server-info">
        <div class="server-icon">📦</div>
        <div>
          <div class="server-name">${config.name || id}</div>

      </button>

      </button>
      ${port !== '—' && isRunning ? `
      <button class="btn btn-ghost" onclick="window.open('http://localhost:${port}/docs','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

  return card;
}

// ── generate api endpoints ──────────────────────
function generateApiEndpoints(id, config, status, currentPort) {
  const isRunning = status?.status === 'running';
  const port = currentPort || status?.port || '—';
  const prefix = config?.prefix || '';
  const endpoints = [];

  // 获取当前页面的hostname和port
  const hostname = window.location.hostname;
  const baseUrl = port !== '—' ? `http://${hostname}:${port}` : `http://${hostname}:[端口]`;

  // 根据不同的服务器类型添加端点
  if (id === 'pdf_extractor' || prefix === '/pdf') {
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/extract`,
      active: isRunning
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/extract/batch`,
      active: isRunning
    });
  } else if (id === 'qrcode_reader' || prefix === '/qrcode') {
    // 新API路径：专用接口优先显示
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/qrreader/url ⭐`,
      active: isRunning,
      desc: 'URL专用接口'
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/qrreader/base64 ⭐`,
      active: isRunning,
      desc: 'Base64专用接口'
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/qrreader`,
      active: isRunning,
      desc: '通用接口'
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/qrreader/batch`,
      active: isRunning,
      desc: '批量处理'
    });
    endpoints.push({
      method: 'GET',
      url: `${baseUrl}/health`,
      active: isRunning,
      desc: '健康检查'
    });
  } else if (id === 'pdf_signature_verifier' || prefix === '/signature') {
    // PDF签章验证器API端点
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/verify`,
      active: isRunning,
      desc: '验证PDF签章'
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/verify/url`,
      active: isRunning,
      desc: 'URL专用接口'
    });
    endpoints.push({
      method: 'POST',
      url: `${baseUrl}/verify/batch`,
      active: isRunning,
      desc: '批量验证'
    });
    endpoints.push({
      method: 'GET',
      url: `${baseUrl}/health`,
      active: isRunning,
      desc: '健康检查'
    });
  }

  // 通用服务器状态API (Hub API)
  endpoints.push({
    method: 'GET',
    url: `${HUB_BASE}/api/v1/servers/${id}/status`,
    active: true // Hub API始终可用
  });

  // 如果没有特定端点，显示通用提示
  if (endpoints.length === 0) {
    return `
      <div class="api-endpoint-item" style="justify-content:center;color:var(--text-muted);font-size:11px;">
        暂无特定API端点
      </div>
    `;
  }

  return endpoints.map(ep => `
    <div class="api-endpoint-item">
      <span class="api-method ${ep.method.toLowerCase()}">${ep.method}</span>
      <span class="api-url">${ep.url}${ep.desc ? ` <span style="color:var(--text-muted);font-size:10px;margin-left:4px;">(${ep.desc})</span>` : ''}</span>
      <span class="api-status-badge ${ep.active ? 'active' : 'inactive'}">
        ${ep.active ? '可用' : '离线'}
      </span>
      <button class="api-copy-btn" onclick="copyToClipboard('${ep.url.replace(' ⭐', '').replace(/ \(.*?\)/, '')}', this)" title="复制URL">
        📋
      </button>
    </div>
  `).join('');
}

// ── copy to clipboard ────────────────────────────
function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const originalText = btn.innerHTML;
    btn.innerHTML = '✓';
    btn.style.background = 'var(--accent-green)';
    btn.style.borderColor = 'var(--accent-green)';

    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.style.background = '';
      btn.style.borderColor = '';
    }, 1500);

    toast('已复制到剪贴板', 'success');
    addLog(`已复制API端点: ${text.slice(0, 50)}...`, 'INFO');
  }).catch(err => {
    toast('复制失败', 'error');
    addLog(`复制失败: ${err.message}`, 'ERROR');
  });
}

// ── port config ────────────────────────────────
function toggleEditPort(id) {
  const input = document.getElementById(`port-input-${id}`);
  const editBtn = document.getElementById(`port-edit-btn-${id}`);
  const saveBtn = document.getElementById(`port-save-btn-${id}`);
  const clearBtn = document.getElementById(`port-clear-btn-${id}`);

  input.removeAttribute('readonly');
  input.style.opacity = '1';
  input.style.cursor = 'text';
  editBtn.style.display = 'none';
  saveBtn.style.display = 'flex';
  if (clearBtn) clearBtn.style.display = 'flex';
  input.focus();
}

async function savePort(id) {
  const input = document.getElementById(`port-input-${id}`);
  const raw   = input.value.trim();
  if (!raw) { toast('请输入端口号', 'warning'); return; }
  const port = parseInt(raw, 10);
  if (isNaN(port) || port < 1024 || port > 65535) {
    toast('端口号须在 1024~65535 之间', 'error'); return;
  }
  try {
    await api(`/api/v1/servers/${id}/port-config`, 'PUT', { port });
    addLog(`固定端口已保存: ${id} → ${port}`, 'SUCCESS');
    toast(`端口已固定为 ${port}，重启后生效`, 'success');
    // optimistic update badge
    const badge = document.getElementById(`port-mode-badge-${id}`);
    if (badge) { badge.className = 'port-mode-badge fixed'; badge.textContent = `固定 · ${port}`; }
    setTimeout(refreshAll, 600);
  } catch(e) {
    addLog(`保存端口失败: ${e.message}`, 'ERROR');
    toast(`保存失败: ${e.message}`, 'error');
  }
}

async function clearPort(id) {
  try {
    await api(`/api/v1/servers/${id}/port-config`, 'DELETE');
    addLog(`${id} 固定端口已移除，将动态分配`, 'SUCCESS');
    toast('已移除固定端口，下次启动将动态分配', 'info');
    setTimeout(refreshAll, 600);
  } catch(e) {
    addLog(`移除端口失败: ${e.message}`, 'ERROR');
    toast(`操作失败: ${e.message}`, 'error');
  }
}

// ── server lifecycle ───────────────────────────
async function serverAction(id, action) {
  const labels = { start:'启动', stop:'停止', restart:'重启' };
  addLog(`正在${labels[action]}服务器: ${id}`, 'INFO');

  // 禁用所有按钮（防止重复点击）
  ['start','stop','restart'].forEach(a => {
    const b = document.getElementById(`btn-${a}-${id}`); if (b) b.disabled = true;
  });

  try {
    const d = await api(`/api/v1/servers/${id}/${action}`, 'POST');
    if (d.success) {
      addLog(`✅ ${labels[action]}成功: ${id}`, 'SUCCESS');
      toast(`${labels[action]}成功: ${id}`, 'success');
    } else {
      const reason = d.message || d.detail || '未知原因';
      toast(`操作失败: ${reason}`, 'error');
      addLog(`${labels[action]}失败: ${reason}`, 'ERROR');
    }
  } catch(e) {
    addLog(`${labels[action]}失败: ${e.message}`, 'ERROR');
    toast(`${labels[action]}失败: ${e.message}`, 'error');
  } finally {
    // 延迟后重新启用按钮并刷新状态
    setTimeout(() => {
      ['start','stop','restart'].forEach(a => {
        const b = document.getElementById(`btn-${a}-${id}`); if (b) b.disabled = false;
      });
      refreshAll();
    }, 1200);
  }
}

async function startAll() {
  const btn = document.querySelector('.btn-start');
  if (btn) btn.disabled = true;

  try {
    const d = await api('/api/v1/servers/start-all', 'POST');
    addLog(`启动全部完成: ${d.started_count} 个`, 'SUCCESS');
    toast(`已启动 ${d.started_count} 个服务器`, 'success');
  } catch(e) {
    toast(`失败: ${e.message}`, 'error');
  } finally {
    setTimeout(() => {
      if (btn) btn.disabled = false;
      refreshAll();

  }
}

}

// ── 🆕 测试中心动态生成 ──────────────────────
function generateTestPanels() {
  const tabsContainer = document.getElementById('test-tabs');
  const contentContainer = document.getElementById('test-tab-content');

  if (!tabsContainer || !contentContainer) {
    console.warn('测试中心容器未找到');
    return;
  }

  // 保存现有的测试结果
  const savedResults = {};
  document.querySelectorAll('[id$="-result"]').forEach(resultDiv => {
    const serverId = resultDiv.id.replace('-result', '');
    savedResults[serverId] = {
      html: resultDiv.innerHTML,
      className: resultDiv.className,
      style: resultDiv.style.cssText
    };
  });

  tabsContainer.innerHTML = '';
  contentContainer.innerHTML = '';

  let firstTab = true;

  // 遍历所有启用的服务器
  for (const [serverId, serverConfig] of Object.entries(servers)) {
    // 跳过没有测试配置的服务
    if (!SERVICE_TESTERS[serverId]) continue;

    const testConfig = SERVICE_TESTERS[serverId];

    // 创建选项卡按钮
    const tab = document.createElement('button');
    tab.className = `test-tab ${firstTab ? 'active' : ''}`;
    tab.innerHTML = `${testConfig.icon} ${testConfig.name}`;
    tab.onclick = () => switchTestTab(serverId);
    tab.dataset.serviceId = serverId;
    tabsContainer.appendChild(tab);

    // 创建选项卡内容
    const content = document.createElement('div');
    content.className = `test-tab-content ${firstTab ? 'active' : ''}`;
    content.id = `tab-content-${serverId}`;
    content.innerHTML = generateTestForm(serverId, testConfig);
    contentContainer.appendChild(content);

    if (firstTab) {
      currentTestTab = serverId;
      firstTab = false;
    }
  }

  // 恢复测试结果
  for (const [serverId, resultData] of Object.entries(savedResults)) {
    const resultDiv = document.getElementById(`${serverId}-result`);
    if (resultDiv && resultData.html) {
      resultDiv.innerHTML = resultData.html;
      resultDiv.className = resultData.className;
      resultDiv.style.cssText = resultData.style;
    }
  }

  // 更新服务数量徽章
  const testableServiceCount = Object.keys(SERVICE_TESTERS).filter(id => servers[id]).length;
  const countBadge = document.getElementById('test-services-count');
  if (countBadge) {
    countBadge.textContent = `${testableServiceCount}服务`;
  }
}

// 切换测试选项卡
function switchTestTab(serverId) {
  // 更新选项卡状态
  document.querySelectorAll('.test-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.serviceId === serverId);
  });

  // 更新内容显示
  document.querySelectorAll('.test-tab-content').forEach(content => {
    content.classList.toggle('active', content.id === `tab-content-${serverId}`);
  });

  currentTestTab = serverId;
  addLog(`切换到测试面板: ${SERVICE_TESTERS[serverId].name}`, 'INFO');
}

// 生成测试表单
function generateTestForm(serverId, testConfig) {
  let html = '<div class="test-form">';

  // 生成输入字段
  testConfig.inputs.forEach(input => {
    if (input.type === 'url') {
      html += `
        <div class="input-group">
          <label class="input-label">${input.label}</label>
          <input id="${serverId}-${input.id}" class="input-field" type="${input.type}"
                 placeholder="${input.placeholder}" ${input.required ? 'required' : ''} />
        </div>
      `;
    } else if (input.type === 'textarea') {
      html += `
        <div class="input-group">
          <label class="input-label">${input.label}</label>
          <textarea id="${serverId}-${input.id}" class="input-field" rows="${input.rows || 3}"
                    placeholder="${input.placeholder}"
                    style="resize:vertical;font-family:'JetBrains Mono',monospace;font-size:11px;"></textarea>
        </div>
      `;
    } else if (input.type === 'checkbox') {
      html += `
        <div class="checkbox-group">
          <input type="checkbox" id="${serverId}-${input.id}" ${input.default ? 'checked' : ''} />
          <label for="${serverId}-${input.id}">${input.label}</label>
        </div>
      `;
    } else if (input.type === 'text') {
      html += `
        <div class="input-group">
          <label class="input-label">${input.label}</label>
          <input id="${serverId}-${input.id}" class="input-field" type="text"
                 placeholder="${input.placeholder}" />
        </div>
      `;
    }
  });

  // 提交按钮
  const icon = testConfig.icon;
  html += `
    <button class="btn btn-primary service-submit-btn"
            style="width:100%;justify-content:center;"
            onclick="submitServiceTest('${serverId}')">
      ${icon} 开始测试
    </button>
  `;

  // 结果显示
  html += `<div id="${serverId}-result" class="result-box"></div>`;

  html += '</div>';

  return html;
}

// 🆕 统一的服务测试提交函数
async function submitServiceTest(serverId) {
  const testConfig = SERVICE_TESTERS[serverId];
  if (!testConfig) {
    toast('测试配置未找到', 'error');
    return;
  }

  const requestData = {};
  let missingRequired = false;

  // 收集输入数据
  for (const input of testConfig.inputs) {
    const element = document.getElementById(`${serverId}-${input.id}`);
    if (!element) {
      console.error(`找不到输入元素: ${serverId}-${input.id}`);
      continue;
    }

    if (input.type === 'checkbox') {
      requestData[input.id] = element.checked;
    } else {
      requestData[input.id] = element.value;
      if (input.required && !element.value.trim()) {
        missingRequired = true;
      }
    }
  }

  if (missingRequired) {
    toast('请填写所有必填字段', 'warning');
    return;
  }

  // 更新UI状态
  const btn = document.querySelector(`#tab-content-${serverId} .service-submit-btn`);
  const resultDiv = document.getElementById(`${serverId}-result`);

  if (btn) btn.disabled = true;
  if (btn) btn.textContent = '测试中…';

  resultDiv.className = 'result-box visible';
  resultDiv.style.color = 'var(--text-muted)';
  resultDiv.textContent = '⏳ 正在测试…';

  addLog(`测试 ${testConfig.name}: ${JSON.stringify(requestData).slice(0,50)}...`, 'INFO');

  try {
    // 智能选择API endpoint（特别针对qrcode_reader）
    let apiEndpoint = testConfig.api.endpoint;
    let apiRequestData = {...requestData};

    if (serverId === 'qrcode_reader') {
      // 检查使用哪种输入方式
      if (requestData.image_url && !requestData.image_base64) {
        // 使用URL专用接口
        apiEndpoint = '/qrcode/qrreader/url';
        apiRequestData = {url: requestData.image_url};
        addLog('使用URL专用接口', 'INFO');
      } else if (requestData.image_base64 && !requestData.image_url) {
        // 使用Base64专用接口
        apiEndpoint = '/qrcode/qrreader/base64';
        apiRequestData = {base64_data: requestData.image_base64};
        addLog('使用Base64专用接口', 'INFO');
      } else {
        // 使用通用接口
        addLog('使用通用接口', 'INFO');
      }
    }

    const d = await api(apiEndpoint, testConfig.api.method, apiRequestData);
    displayTestResult(serverId, d);
  } catch(e) {
    displayTestError(serverId, e);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `${testConfig.icon} 开始测试`;
    }
  }
}

// 🆕 显示测试结果
function displayTestResult(serverId, result) {
  const resultDiv = document.getElementById(`${serverId}-result`);
  const testConfig = SERVICE_TESTERS[serverId];

  if (!resultDiv) return;

  if (result.success) {
    resultDiv.className = 'result-box visible success';

    // 根据不同服务类型格式化结果
    if (serverId === 'pdf_extractor') {
      const metaStr = result.metadata
        ? `\n[📋 元数据]\n  标题: ${result.metadata.title||'—'}\n  作者: ${result.metadata.author||'—'}\n  制作: ${result.metadata.producer||'—'}\n`
        : '';

      resultDiv.innerHTML = `
        <div class="test-success-content">
          <div style="font-weight:600;margin-bottom:8px;">✅ 提取成功</div>
          <div style="font-size:12px;color:var(--accent-green);margin-bottom:4px;">
            共 ${result.total_pages} 页
          </div>
          ${metaStr ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${metaStr}</div>` : ''}
          <div style="margin-top:8px;">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">[内容预览]</div>
            <div style="max-height:200px;overflow-y:auto;font-size:11px;font-family:monospace;background:rgba(0,0,0,0.02);padding:8px;border-radius:4px;">
              ${(result.content || '').slice(0,500)}${result.content?.length>500?'\n…（已截断）':''}
            </div>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;"
                    onclick="copyTestResult('${serverId}-result')">
              📋 复制
            </button>
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;"
                    onclick="clearTestResult('${serverId}-result')">
              🗑️ 清除
            </button>
          </div>
        </div>
      `;
    } else if (serverId === 'qrcode_reader') {
      const metaStr = result.metadata
        ? `\n[📋 元数据]\n  类型: ${result.metadata.type||'—'}\n  检测到: ${result.metadata.detected ? '是' : '否'}\n`
        : '';

      resultDiv.innerHTML = `
        <div class="test-success-content">
          <div style="font-weight:600;margin-bottom:8px;">✅ 识别成功</div>
          ${metaStr ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${metaStr}</div>` : ''}
          <div style="margin-top:8px;">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">[二维码内容]</div>
            <div style="word-break:break-all;font-size:12px;background:rgba(0,0,0,0.02);padding:8px;border-radius:4px;">
              ${result.qr_data || '无内容'}
            </div>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;"
                    onclick="copyTestResult('${serverId}-result')">
              📋 复制
            </button>
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;"
                    onclick="clearTestResult('${serverId}-result')">
              🗑️ 清除
            </button>
          </div>
        </div>
      `;
    } else {
      // 通用结果显示
      resultDiv.innerHTML = `
        <div class="test-success-content">
          <div style="font-weight:600;margin-bottom:8px;">✅ 测试成功</div>
          <div style="white-space:pre-wrap;font-size:11px;font-family:monospace;background:rgba(0,0,0,0.02);padding:8px;border-radius:4px;">
${JSON.stringify(result, null, 2)}
          </div>
        </div>
      `;
    }

    toast('测试成功！', 'success');
    addLog(`${testConfig.name}测试成功`, 'SUCCESS');
  } else {
    resultDiv.className = 'result-box visible error';
    resultDiv.innerHTML = `
      <div class="test-error-content">
        <div style="font-weight:600;margin-bottom:8px;">❌ 测试失败</div>
        <div style="font-size:12px;color:var(--accent-red);">
          ${result.error || '未知错误'}
        </div>
      </div>
    `;
    toast('测试失败', 'error');
    addLog(`${testConfig.name}测试失败: ${result.error}`, 'ERROR');
  }
}

// 🆕 显示测试错误
function displayTestError(serverId, error) {
  const resultDiv = document.getElementById(`${serverId}-result`);
  const testConfig = SERVICE_TESTERS[serverId];

  if (!resultDiv) return;

  const errorMsg = error.message || error.toString();

  resultDiv.className = 'result-box visible error';
  resultDiv.innerHTML = `
    <div class="test-error-content">
      <div style="font-weight:600;margin-bottom:8px;">❌ 请求失败</div>
      <div style="font-size:12px;color:var(--accent-red);margin-bottom:8px;">
        ${errorMsg}
      </div>
      <div style="margin-top:8px;">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">💡 可能原因:</div>
        <div style="font-size:11px;color:var(--text-secondary);">
          • ${testConfig.name} 服务未运行<br>
          • 网络连接问题<br>
          • API 端点配置错误
        </div>
      </div>
    </div>
  `;

  addLog(`${testConfig.name}请求失败: ${errorMsg}`, 'ERROR');
}

// 🆕 复制测试结果
function copyTestResult(elementId) {
  const resultDiv = document.getElementById(elementId);
  if (!resultDiv) return;

  const text = resultDiv.textContent || resultDiv.innerText;
  if (!text) return;

  navigator.clipboard.writeText(text).then(() => {
    toast('结果已复制到剪贴板', 'success');
  }).catch(err => {
    toast('复制失败', 'error');
  });
}

// 🆕 清除测试结果
function clearTestResult(elementId) {
  const resultDiv = document.getElementById(elementId);
  if (resultDiv) {
    resultDiv.className = 'result-box';
    resultDiv.innerHTML = '';
    resultDiv.style.cssText = '';
  }
}

async function submitPDF() {

  btn.disabled = true; btn.textContent = '提取中…';
  res.className = 'result-box visible';
  res.style.color = 'var(--text-muted)';
  res.textContent = '⏳ 正在请求 pdf_extractor…';
  addLog(`PDF提取: ${url.slice(0,60)}…`, 'INFO');
  try {
    const d = await api('/pdf/extract', 'POST', { url, include_metadata: meta });

      res.className = 'result-box visible success';
      const metaStr = d.metadata
        ? `\n[元数据]\n  标题: ${d.metadata.title||'—'}\n  作者: ${d.metadata.author||'—'}\n  制作: ${d.metadata.producer||'—'}\n`

      res.textContent = `✅ 提取成功 | 共 ${d.total_pages} 页\n${metaStr}\n[内容预览]\n${(d.content||'').slice(0,800)}${d.content?.length>800?'\n…（已截断）':''}`;

      res.className = 'result-box visible error';
      res.textContent = `❌ 提取失败\n\n${d.error}`;
      addLog(`PDF提取失败: ${d.error}`, 'ERROR');
      toast('PDF 提取失败', 'error');
    }
  } catch(e) {
    res.className = 'result-box visible error';
    res.textContent = `❌ 请求失败: ${e.message}\n\n请确认 pdf_extractor 正在运行`;
    addLog(`PDF请求失败: ${e.message}`, 'ERROR');
    toast(`请求失败: ${e.message}`, 'error');
