<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Servers Hub — Dashboard</title>
  <meta name="description" content="MCP Servers Hub 可视化管理控制台 — 实时监控、固定端口配置、启停控制" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:        #ffffff;
      --bg-surface:     #f8fafc;
      --bg-glass:       rgba(255,255,255,0.8);
      --bg-glass-hover: rgba(241,245,249,0.95);
      --border:         #e2e8f0;
      --border-light:   #cbd5e1;

      --accent-blue:   #2563eb;
      --accent-cyan:   #0891b2;
      --accent-purple: #7c3aed;
      --accent-green:  #059669;
      --accent-orange: #d97706;
      --accent-red:    #dc2626;

      --text-primary:  #1e293b;
      --text-secondary:#64748b;
      --text-muted:    #94a3b8;

      --radius-sm: 8px; --radius-md: 12px;
      --radius-lg: 16px; --radius-xl: 24px;

      --shadow-glow-blue:  0 0 40px rgba(37,99,235,0.12);
      --shadow-glow-green: 0 0 30px rgba(5,150,105,0.15);
      --shadow-card:       0 2px 12px rgba(0,0,0,0.08);
      --shadow-card-hover: 0 4px 20px rgba(0,0,0,0.12);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37,99,235,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(124,58,237,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 50%, rgba(8,145,178,0.02) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 0 28px 80px; }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: var(--shadow-card); border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .header-title h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-title p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .hub-url {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--text-secondary); background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px;
    }
    .refresh-btn {
      width: 36px; height: 36px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .refresh-btn:hover { background: var(--bg-glass-hover); color: var(--accent-blue); border-color: var(--accent-blue); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STAT CARDS ── */
    .status-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
      transition: all var(--transition); position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .stat-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity var(--transition); }
    .stat-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.blue::before  { background: linear-gradient(135deg, rgba(37,99,235,0.03), transparent); }
    .stat-card.green::before { background: linear-gradient(135deg, rgba(5,150,105,0.03), transparent); }
    .stat-card.purple::before{ background: linear-gradient(135deg, rgba(124,58,237,0.03), transparent); }
    .stat-card.cyan::before  { background: linear-gradient(135deg, rgba(8,145,178,0.03), transparent); }
    .stat-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .stat-icon.blue   { background: rgba(59,130,246,0.15); }
    .stat-icon.green  { background: rgba(16,185,129,0.15); }
    .stat-icon.purple { background: rgba(139,92,246,0.15); }
    .stat-icon.cyan   { background: rgba(6,182,212,0.15); }
    .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-value.blue   { color: var(--accent-blue); }
    .stat-value.green  { color: var(--accent-green); }
    .stat-value.purple { color: var(--accent-purple); }
    .stat-value.cyan   { color: var(--accent-cyan); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── GLOBAL ACTIONS ── */
    .global-actions {
      display: flex; gap: 10px; padding: 14px 20px;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 24px; align-items: center;
      box-shadow: var(--shadow-card);
    }
    .global-actions-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }

    /* ── MAIN GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr 390px; gap: 24px; align-items: start; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); }

    /* ── SERVER CARD ── */
    .server-card {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px;
      transition: all var(--transition); position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .server-card:hover { border-color: var(--accent-blue); box-shadow: var(--shadow-card-hover); }
    .server-card.running { border-color: rgba(5,150,105,0.3); background: linear-gradient(135deg, #ffffff 0%, rgba(5,150,105,0.02) 100%); }
    .server-card.stopped, .server-card.not_running { border-color: rgba(220,38,38,0.2); background: linear-gradient(135deg, #ffffff 0%, rgba(220,38,38,0.02) 100%); }

    .server-top {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px;
    }
    .server-info { display: flex; align-items: center; gap: 14px; }
    .server-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
      border: 1px solid rgba(37,99,235,0.2); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .server-name { font-size: 16px; font-weight: 600; }
    .server-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .server-module { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-cyan); margin-top: 4px; opacity: 0.8; }

    .status-badge {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-radius: 999px; font-size: 12px; font-weight: 500; flex-shrink: 0;
    }
    .status-badge.running { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); color: var(--accent-green); }
    .status-badge.stopped, .status-badge.not_running { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); color: var(--accent-red); }

    .pulse { width: 8px; height: 8px; border-radius: 50%; position: relative; flex-shrink: 0; }
    .pulse.green { background: var(--accent-green); }
    .pulse.red   { background: var(--accent-red); }
    .pulse.green::after {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: var(--accent-green); animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.2); opacity: 0; } }

    /* ── SERVER META ── */
    .server-meta {
      display: flex; gap: 0; margin-bottom: 18px;
      background: var(--bg-surface); border-radius: var(--radius-sm);
      border: 1px solid var(--border); overflow: hidden;
    }
    .meta-item {
      flex: 1; padding: 10px 14px;
      border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px;
    }
    .meta-item:last-child { border-right: none; }
    .meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); }
    .meta-value.highlight { color: var(--accent-cyan); }

    /* ── PORT CONFIG ROW ── */
    .port-config-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
      padding: 12px 16px;
      background: rgba(37,99,235,0.04);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: var(--radius-sm);
    }
    .port-config-label {
      font-size: 12px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0;
    }
    .port-mode-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    }
    .port-mode-badge.fixed   { background: rgba(5,150,105,0.1); color: var(--accent-green); border: 1px solid rgba(5,150,105,0.3); }
    .port-mode-badge.dynamic { background: rgba(217,119,6,0.1); color: var(--accent-orange); border: 1px solid rgba(217,119,6,0.3); }

    .port-input-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .port-input {
      width: 90px; background: #ffffff; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
      padding: 6px 10px; text-align: center; transition: all var(--transition);
    }
    .port-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .port-input::placeholder { color: var(--text-muted); font-size: 11px; }

    .port-hint {
      font-size: 11px; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace; white-space: nowrap;
    }

    /* ── SERVER ACTIONS ── */
    .server-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; transition: all var(--transition);
      white-space: nowrap; font-family: 'Inter', sans-serif;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-start   { background: rgba(5,150,105,0.1);  border-color: rgba(5,150,105,0.3);  color: var(--accent-green); }
    .btn-start:hover { background: rgba(5,150,105,0.2); border-color: rgba(5,150,105,0.5); }
    .btn-stop    { background: rgba(220,38,38,0.08);    border-color: rgba(220,38,38,0.25);    color: var(--accent-red); }
    .btn-stop:hover  { background: rgba(220,38,38,0.15);  border-color: rgba(220,38,38,0.4); }
    .btn-restart { background: rgba(217,119,6,0.08);   border-color: rgba(217,119,6,0.25);   color: var(--accent-orange); }
    .btn-restart:hover{ background: rgba(217,119,6,0.15); border-color: rgba(217,119,6,0.4); }
    .btn-port-save { background: rgba(37,99,235,0.1); border-color: rgba(37,99,235,0.3); color: var(--accent-blue); padding: 6px 14px; }
    .btn-port-save:hover { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.5); }
    .btn-port-clear { background: transparent; border-color: var(--border); color: var(--text-secondary); padding: 6px 10px; font-size: 12px; }
    .btn-port-clear:hover { color: var(--accent-red); border-color: rgba(220,38,38,0.3); background: rgba(220,38,38,0.06); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-color: transparent; color: white;
      box-shadow: 0 2px 8px rgba(37,99,235,0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    .btn-ghost { background: #ffffff; border-color: var(--border); color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--bg-surface); border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    /* ── PANEL ── */
    .panel { background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card); }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-surface);
    }
    .panel-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 20px; }

    /* ── PDF TESTER ── */
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .input-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .input-field {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 14px;
      transition: all var(--transition); width: 100%;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }

    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .checkbox-group input { accent-color: var(--accent-blue); width: 14px; height: 14px; }
    .checkbox-group label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }

    .result-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-secondary); max-height: 220px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all; line-height: 1.6; display: none;
    }
    .result-box.visible { display: block; }
    .result-box.success { border-color: rgba(5,150,105,0.3); color: var(--accent-green); background: rgba(5,150,105,0.03); }
    .result-box.error   { border-color: rgba(220,38,38,0.3);  color: var(--accent-red); background: rgba(220,38,38,0.03); }

    /* ── LOG ── */
    .log-container {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
      max-height: 280px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7;
    }
    .log-line {
      padding: 3px 14px; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: baseline;
    }
    .log-line:last-child { border-bottom: none; }
    .log-time  { color: var(--text-muted); flex-shrink: 0; font-size: 10px; }
    .log-level { flex-shrink: 0; font-size: 10px; font-weight: 600; width: 46px; }
    .log-level.INFO    { color: var(--accent-blue); }
    .log-level.WARNING { color: var(--accent-orange); }
    .log-level.ERROR   { color: var(--accent-red); }
    .log-level.SUCCESS { color: var(--accent-green); }
    .log-msg { color: var(--text-secondary); word-break: break-all; }

    /* ── HEALTH ── */
    .health-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; position: relative; flex-shrink: 0;
      background: #ffffff;
    }
    .health-ring.healthy { border-color: rgba(5,150,105,0.4); box-shadow: 0 0 12px rgba(5,150,105,0.15); }
    .health-ring.offline  { border-color: rgba(220,38,38,0.3); }

    /* ── TOAST ── */
    #toast-container { position: fixed; bottom: 28px; right: 28px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      font-size: 13px; font-weight: 500;
      animation: toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; max-width: 320px;
    }
    .toast.success { border-color: rgba(5,150,105,0.3); color: var(--accent-green); background: rgba(5,150,105,0.03); }
    .toast.error   { border-color: rgba(220,38,38,0.3);  color: var(--accent-red); background: rgba(220,38,38,0.03); }
    .toast.info    { border-color: rgba(37,99,235,0.3);  color: var(--accent-blue); background: rgba(37,99,235,0.03); }
    .toast.warning { border-color: rgba(217,119,6,0.3); color: var(--accent-orange); background: rgba(217,119,6,0.03); }
    @keyframes toast-in  { from { opacity:0; transform:translateX(20px) scale(0.95); } to { opacity:1; transform:translateX(0) scale(1); } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateX(20px); } }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 13px; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { flex-direction: row; flex-wrap: wrap; }
      .sidebar > * { flex: 1 1 320px; }
    }
    @media (max-width: 700px) {
      .status-bar { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    }

    /* ── PERFORMANCE GRID ── */
    .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .perf-item {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .perf-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .perf-value { font-size: 14px; font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }

    /* ── CONFIG LIST ── */
    .config-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 12px; transition: background var(--transition);
    }
    .config-item:last-child { border-bottom: none; }
    .config-item:hover { background: var(--bg-surface); }
    .config-info { display: flex; flex-direction: column; gap: 2px; }
    .config-name { font-weight: 500; color: var(--text-primary); }
    .config-id { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .config-actions { display: flex; gap: 6px; }
    .config-btn {
      padding: 4px 8px; font-size: 10px; border-radius: 4px;
      border: 1px solid var(--border); background: #ffffff;
      cursor: pointer; transition: all var(--transition);
    }
    .config-btn:hover { background: var(--bg-surface); border-color: var(--accent-blue); }
    .config-btn.toggle { width: 32px; text-align: center; }
    .config-btn.toggle.active { background: rgba(5,150,105,0.1); border-color: rgba(5,150,105,0.3); color: var(--accent-green); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);

      z-index: 10000; opacity: 0; pointer-events: none; transition: opacity var(--transition);

    .modal-close {

      cursor: pointer; display: flex; align-items: center; justify-content: center;

    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
  </style>
</head>

<div id="toast-container"></div>

<script>
// 自动检测 HUB_BASE（从当前页面 URL 获取）
const HUB_BASE = `${window.location.protocol}//${window.location.hostname}:${window.location.port}`;

// 如果是 file:// 协议，则使用默认值
if (window.location.protocol === 'file:') {
  window.HUB_BASE_FALLBACK = 'http://localhost:51234';
}

// state
let servers     = {};   // { [id]: { config, status, portConfig } }
let pdfOnline   = false;
let pageStart   = Date.now();
let autoTimer   = 15;
let authToken   = localStorage.getItem('mcp_hub_token') || null;
let currentUsername = localStorage.getItem('mcp_hub_username') || null;

// ── utils ──────────────────────────────────────
function formatUptime(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ── toast ──────────────────────────────────────
function toast(msg, type = 'info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toast-out 0.3s ease forwards';
    setTimeout(() => el.remove(), 310);
  }, 3500);
}

// ── log ────────────────────────────────────────
function addLog(msg, level = 'INFO') {
  const c = document.getElementById('log-container');
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${t}</span><span class="log-level ${level}">${level}</span><span class="log-msg">${msg}</span>`;
  c.appendChild(line);
  c.scrollTop = c.scrollHeight;
  while (c.children.length > 120) c.removeChild(c.firstChild);
}
function clearLogs() { document.getElementById('log-container').innerHTML = ''; addLog('日志已清空'); }

// ── api ────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };

  // 添加认证 Token
  if (authToken) {
    opts.headers['Authorization'] = `Bearer ${authToken}`;
  }

  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${HUB_BASE}${path}`, opts);

  // 处理 401 未授权
  if (res.status === 401) {
    logout();
    throw new Error('未授权，请重新登录');
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── authentication ─────────────────────────────
function checkAuth() {
  if (authToken && currentUsername) {
    // 已登录
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('username-display').textContent = currentUsername;
    return true;
  } else {
    // 未登录，显示登录框
    document.getElementById('login-modal').classList.add('active');
    return false;
  }
}

async function performLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('login-remember').checked;
  const errorDiv = document.getElementById('login-error');

  if (!username || !password) {
    errorDiv.textContent = '请输入用户名和密码';
    errorDiv.style.display = 'block';
    return;
  }

  try {
    const d = await fetch(`${HUB_BASE}/api/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!d.ok) {
      const err = await d.json().catch(() => ({}));
      throw new Error(err.detail || '登录失败');
    }

    const data = await d.json();
    authToken = data.access_token;
    currentUsername = username;

    // 保存到 localStorage
    if (remember) {
      localStorage.setItem('mcp_hub_token', authToken);
      localStorage.setItem('mcp_hub_username', username);
    }

    // 更新 UI
    document.getElementById('login-modal').classList.remove('active');
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('username-display').textContent = username;
    errorDiv.style.display = 'none';

    // 清空表单
    document.getElementById('login-form').reset();

    addLog(`用户 ${username} 已登录`, 'SUCCESS');
    toast('登录成功', 'success');

    // 开始加载数据
    refreshAll();
  } catch(e) {
    errorDiv.textContent = e.message;
    errorDiv.style.display = 'block';
  }
}

function performLogout() {
  authToken = null;
  currentUsername = null;
  localStorage.removeItem('mcp_hub_token');
  localStorage.removeItem('mcp_hub_username');

  document.getElementById('user-info').style.display = 'none';
  document.getElementById('login-modal').classList.add('active');

  addLog('用户已退出登录', 'INFO');
  toast('已退出登录', 'info');
}

function logout() {
  performLogout();
}

// ── fetch ──────────────────────────────────────
async function fetchHealth() {
  try {
    const d = await api('/health');
    const ring = document.getElementById('health-ring');
    ring.className  = 'health-ring healthy';
    ring.textContent = '💚';
    document.getElementById('health-status-text').textContent = '健康';
    document.getElementById('health-status-text').style.color = 'var(--accent-green)';
    document.getElementById('health-version').textContent = `架构: ${d.architecture || '进程隔离'}`;
    document.getElementById('health-detail').innerHTML =
      `<div>已加载进程: <b style="color:var(--text-primary)">${d.loaded_servers}</b></div>
       <div>运行中进程: <b style="color:var(--accent-green)">${d.running_servers}</b></div>
       <div>活跃服务: <b style="color:var(--accent-cyan)">${(d.servers||[]).join(', ')||'无'}</b></div>`;
    document.getElementById('stat-hub').textContent = '在线';
  } catch(e) {
    const ring = document.getElementById('health-ring');
    ring.className  = 'health-ring offline';
    ring.textContent = '❌';
    document.getElementById('health-status-text').textContent = 'Hub 离线';
    document.getElementById('health-status-text').style.color = 'var(--accent-red)';
    document.getElementById('health-version').textContent = e.message;
    document.getElementById('stat-hub').textContent = '离线';
  }
}

async function fetchServers() {
  try {
    const [listData, statusData, portConfData] = await Promise.all([
      api('/api/v1/servers'),
      api('/api/v1/servers/statuses'),
      api('/api/v1/servers/port-configs'),
    ]);
    const merged = {};
    for (const srv of (listData.servers || [])) {
      merged[srv.id] = {
        config:     srv,
        status:     statusData[srv.id]  || { status: 'not_running' },
        portConfig: portConfData[srv.id] || { mode: 'dynamic', fixed_port: null },
      };
    }
    servers = merged;
    renderServers();
  } catch(e) {
    addLog(`获取服务器列表失败: ${e.message}`, 'ERROR');
    document.getElementById('servers-container').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔌</div>
        <div>无法连接到 Hub (${e.message})</div>
        <div style="margin-top:8px;font-size:11px;">请运行: <code style="color:var(--accent-cyan)">bash start_safe.sh</code></div>
      </div>`;
  }
}

// ── render ─────────────────────────────────────
function renderServers() {
  const container = document.getElementById('servers-container');
  if (!Object.keys(servers).length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>暂无已注册的 MCP 服务器</div></div>`;
    updateStats(0, 0); return;
  }

  // 获取过滤条件
  const searchText = document.getElementById('search-input').value.toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;

  let running = 0;
  let displayed = 0;
  const total = Object.keys(servers).length;
  container.innerHTML = '';

  for (const [id, data] of Object.entries(servers)) {
    if (data.status?.status === 'running') running++;
    if (id === 'pdf_extractor') pdfOnline = data.status?.status === 'running';

    // 应用过滤条件
    const matchesSearch = (
      searchText === '' ||
      (data.config?.name || '').toLowerCase().includes(searchText) ||
      (data.config?.module || '').toLowerCase().includes(searchText) ||
      (data.config?.description || '').toLowerCase().includes(searchText) ||
      id.toLowerCase().includes(searchText)
    );

    const matchesStatus = (
      statusFilter === 'all' ||
      (statusFilter === 'running' && data.status?.status === 'running') ||
      (statusFilter === 'stopped' && data.status?.status !== 'running')
    );

    if (matchesSearch && matchesStatus) {
      container.appendChild(buildCard(id, data));
      displayed++;
    }
  }

  // 如果没有匹配的结果
  if (displayed === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>没有找到匹配的服务器</div></div>`;
  }

  updateStats(running, total);
  updatePDFBadge();
}

// ── filter ────────────────────────────────────
function filterServers() {
  renderServers();
}

function buildCard(id, { config, status, portConfig }) {
  const isRunning    = status?.status === 'running';
  const statusClass  = status?.status || 'not_running';
  const badgeLabel   = isRunning ? '运行中' : (status?.status === 'stopped' ? '已停止' : '未运行');
  const pid     = status?.pid     ?? status?.last_info?.pid     ?? '—';
  const port    = status?.port    ?? status?.last_info?.port    ?? '—';
  const uptime  = status?.uptime_seconds != null ? formatUptime(status.uptime_seconds) : '—';
  const restarts = status?.restart_count ?? status?.last_info?.restart_count ?? '—';

  const isFixed    = portConfig?.mode === 'fixed';
  const fixedPort  = portConfig?.fixed_port;

  const card = document.createElement('div');
  card.className = `server-card ${statusClass}`;
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="server-top">
      <div class="server-info">
        <div class="server-icon">📦</div>
        <div>
          <div class="server-name">${config.name || id}</div>
          <div class="server-desc">${config.description || ''}</div>
          <div class="server-module">${config.module || ''}</div>
        </div>
      </div>
      <div class="status-badge ${statusClass}">
        <span class="pulse ${isRunning ? 'green' : 'red'}"></span>
        ${badgeLabel}
      </div>
    </div>

    <!-- runtime meta -->
    <div class="server-meta">
      <div class="meta-item"><span class="meta-label">PID</span><span class="meta-value highlight">${pid}</span></div>
      <div class="meta-item"><span class="meta-label">当前端口</span><span class="meta-value highlight">${port}</span></div>
      <div class="meta-item"><span class="meta-label">运行时长</span><span class="meta-value">${uptime}</span></div>
      <div class="meta-item"><span class="meta-label">重启次数</span><span class="meta-value">${restarts}</span></div>
    </div>

    <!-- port config row -->
    <div class="port-config-row" id="port-row-${id}">
      <div>
        <span class="port-config-label">🔌 固定端口</span>
        <div style="margin-top:4px;">
          <span class="port-mode-badge ${isFixed ? 'fixed' : 'dynamic'}" id="port-mode-badge-${id}">
            ${isFixed ? `固定 · ${fixedPort}` : '动态分配'}
          </span>
        </div>
      </div>
      <div class="port-input-wrap">
        <span class="port-hint">${isFixed ? `当前固定:` : '设置端口:'}</span>
        <input
          class="port-input"
          id="port-input-${id}"
          type="number" min="1024" max="65535"
          placeholder="如 51238"
          value="${isFixed ? fixedPort : ''}"
          title="输入固定端口号 (1024–65535)"
          readonly
          style="opacity: 0.7; cursor: not-allowed;"
        />
        <button class="btn btn-ghost" id="port-edit-btn-${id}" style="padding:6px 12px; font-size:12px;" onclick="toggleEditPort('${id}')">
          ✏️ 锁定 / 编辑
        </button>
        <button class="btn btn-port-save" id="port-save-btn-${id}" style="display:none;" onclick="savePort('${id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg>
          保存
        </button>
        ${isFixed ? `<button class="btn btn-port-clear" id="port-clear-btn-${id}" style="display:none;" onclick="clearPort('${id}')" title="恢复动态分配">✕ 注销端口</button>` : ''}
      </div>
    </div>

    <!-- lifecycle actions -->
    <div class="server-actions">
      <button class="btn btn-start"   id="btn-start-${id}"   onclick="serverAction('${id}','start')"   ${isRunning ? 'disabled' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 启动
      </button>
      <button class="btn btn-stop"    id="btn-stop-${id}"    onclick="serverAction('${id}','stop')"    ${!isRunning ? 'disabled' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 停止
      </button>
      <button class="btn btn-restart" id="btn-restart-${id}" onclick="serverAction('${id}','restart')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/></svg> 重启
      </button>
      ${port !== '—' && isRunning ? `
      <button class="btn btn-ghost" onclick="window.open('http://localhost:${port}/docs','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        API 文档
      </button>` : ''}
    </div>
  `;
  return card;
}

function updateStats(r, t) {
  document.getElementById('stat-running').textContent = r;
  document.getElementById('stat-total').textContent   = t;
}
function updatePDFBadge() {
  const b = document.getElementById('pdf-server-badge');
  b.style.cssText = pdfOnline
    ? 'font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--accent-green)'
    : 'font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--accent-red)';
  b.textContent = pdfOnline ? '在线' : '离线';
}

// ── port config ────────────────────────────────
function toggleEditPort(id) {
  const input = document.getElementById(`port-input-${id}`);
  const editBtn = document.getElementById(`port-edit-btn-${id}`);
  const saveBtn = document.getElementById(`port-save-btn-${id}`);
  const clearBtn = document.getElementById(`port-clear-btn-${id}`);

  input.removeAttribute('readonly');
  input.style.opacity = '1';
  input.style.cursor = 'text';
  editBtn.style.display = 'none';
  saveBtn.style.display = 'flex';
  if (clearBtn) clearBtn.style.display = 'flex';
  input.focus();
}

async function savePort(id) {
  const input = document.getElementById(`port-input-${id}`);
  const raw   = input.value.trim();
  if (!raw) { toast('请输入端口号', 'warning'); return; }
  const port = parseInt(raw, 10);
  if (isNaN(port) || port < 1024 || port > 65535) {
    toast('端口号须在 1024~65535 之间', 'error'); return;
  }
  try {
    await api(`/api/v1/servers/${id}/port-config`, 'PUT', { port });
    addLog(`固定端口已保存: ${id} → ${port}`, 'SUCCESS');
    toast(`端口已固定为 ${port}，重启后生效`, 'success');
    // optimistic update badge
    const badge = document.getElementById(`port-mode-badge-${id}`);
    if (badge) { badge.className = 'port-mode-badge fixed'; badge.textContent = `固定 · ${port}`; }
    setTimeout(refreshAll, 600);
  } catch(e) {
    addLog(`保存端口失败: ${e.message}`, 'ERROR');
    toast(`保存失败: ${e.message}`, 'error');
  }
}

async function clearPort(id) {
  try {
    await api(`/api/v1/servers/${id}/port-config`, 'DELETE');
    addLog(`${id} 固定端口已移除，将动态分配`, 'SUCCESS');
    toast('已移除固定端口，下次启动将动态分配', 'info');
    setTimeout(refreshAll, 600);
  } catch(e) {
    addLog(`移除端口失败: ${e.message}`, 'ERROR');
    toast(`操作失败: ${e.message}`, 'error');
  }
}

// ── server lifecycle ───────────────────────────
async function serverAction(id, action) {
  const labels = { start:'启动', stop:'停止', restart:'重启' };
  addLog(`正在${labels[action]}服务器: ${id}`, 'INFO');

  // 禁用所有按钮（防止重复点击）
  ['start','stop','restart'].forEach(a => {
    const b = document.getElementById(`btn-${a}-${id}`); if (b) b.disabled = true;
  });

  try {
    const d = await api(`/api/v1/servers/${id}/${action}`, 'POST');
    if (d.success) {
      addLog(`✅ ${labels[action]}成功: ${id}`, 'SUCCESS');
      toast(`${labels[action]}成功: ${id}`, 'success');
    } else {
      const reason = d.message || d.detail || '未知原因';
      toast(`操作失败: ${reason}`, 'error');
      addLog(`${labels[action]}失败: ${reason}`, 'ERROR');
    }
  } catch(e) {
    addLog(`${labels[action]}失败: ${e.message}`, 'ERROR');
    toast(`${labels[action]}失败: ${e.message}`, 'error');
  } finally {
    // 延迟后重新启用按钮并刷新状态
    setTimeout(() => {
      ['start','stop','restart'].forEach(a => {
        const b = document.getElementById(`btn-${a}-${id}`); if (b) b.disabled = false;
      });
      refreshAll();
    }, 1200);
  }
}

async function startAll() {
  const btn = document.querySelector('.btn-start');
  if (btn) btn.disabled = true;

  try {
    const d = await api('/api/v1/servers/start-all', 'POST');
    addLog(`启动全部完成: ${d.started_count} 个`, 'SUCCESS');
    toast(`已启动 ${d.started_count} 个服务器`, 'success');
  } catch(e) {
    toast(`失败: ${e.message}`, 'error');
  } finally {
    setTimeout(() => {
      if (btn) btn.disabled = false;
      refreshAll();
    }, 1200);
  }
}

async function stopAll() {
  const btn = document.querySelector('.btn-stop');
  if (btn) btn.disabled = true;

  try {
    const d = await api('/api/v1/servers/stop-all', 'POST');
    addLog(`停止全部完成: ${d.stopped_count} 个`, 'SUCCESS');
    toast(`已停止 ${d.stopped_count} 个服务器`, 'success');
  } catch(e) {
    toast(`失败: ${e.message}`, 'error');
  } finally {
    setTimeout(() => {
      if (btn) btn.disabled = false;
      refreshAll();
    }, 1200);
  }
}

// ── pdf tester ─────────────────────────────────
async function submitPDF() {
  const url  = document.getElementById('pdf-url').value.trim();
  const meta = document.getElementById('pdf-meta').checked;
  const btn  = document.getElementById('pdf-submit-btn');
  const res  = document.getElementById('pdf-result');
  if (!url) { toast('请输入 PDF URL', 'warning'); return; }
  btn.disabled = true; btn.textContent = '提取中…';
  res.className = 'result-box visible';
  res.style.color = 'var(--text-muted)';
  res.textContent = '⏳ 正在请求 pdf_extractor…';
  addLog(`PDF提取: ${url.slice(0,60)}…`, 'INFO');
  try {
    const d = await api('/pdf/extract', 'POST', { url, include_metadata: meta });
    if (d.success) {
      res.className = 'result-box visible success';
      const metaStr = d.metadata
        ? `\n[元数据]\n  标题: ${d.metadata.title||'—'}\n  作者: ${d.metadata.author||'—'}\n  制作: ${d.metadata.producer||'—'}\n`
        : '';
      res.textContent = `✅ 提取成功 | 共 ${d.total_pages} 页\n${metaStr}\n[内容预览]\n${(d.content||'').slice(0,800)}${d.content?.length>800?'\n…（已截断）':''}`;
      addLog(`PDF提取成功，共 ${d.total_pages} 页`, 'SUCCESS');
      toast(`提取成功！${d.total_pages} 页`, 'success');
    } else {
      res.className = 'result-box visible error';
      res.textContent = `❌ 提取失败\n\n${d.error}`;
      addLog(`PDF提取失败: ${d.error}`, 'ERROR');
      toast('PDF 提取失败', 'error');
    }
  } catch(e) {
    res.className = 'result-box visible error';
    res.textContent = `❌ 请求失败: ${e.message}\n\n请确认 pdf_extractor 正在运行`;
    addLog(`PDF请求失败: ${e.message}`, 'ERROR');
    toast(`请求失败: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 开始提取`;
  }
}

// ── refresh ────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try { await Promise.all([fetchHealth(), fetchServers()]); }
  finally { btn.classList.remove('spinning'); resetCountdown(); }
}
function resetCountdown() {
  autoTimer = 15;
  document.getElementById('auto-refresh-countdown').textContent = '15s';
}

// ── init ───────────────────────────────────────
(async function init() {
  addLog('Dashboard 初始化', 'INFO');
  addLog(`连接 Hub: ${HUB_BASE}`, 'INFO');

  // 更新显示的 Hub URL
  document.getElementById('hub-url').textContent = HUB_BASE;

  // 检查认证状态
  if (!checkAuth()) {
    // 未登录，等待用户登录
    return;
  }

  await refreshAll();
  addLog('初始化完成，自动监控中', 'SUCCESS');

  // uptime counter
  setInterval(() => {
    document.getElementById('stat-uptime').textContent = formatUptime((Date.now()-pageStart)/1000);
  }, 1000);

  // auto refresh countdown
  setInterval(() => {
    autoTimer--;
    const el = document.getElementById('auto-refresh-countdown');
    if (el) el.textContent = autoTimer + 's';
    if (autoTimer <= 0) refreshAll();
  }, 1000);

  // 初始化性能监控
  fetchPerformance();
  setInterval(fetchPerformance, 5000); // 每 5 秒更新

  // 初始化配置列表
  fetchConfigList();
})();

// ── config management ──────────────────────────
async function fetchConfigList() {
  try {
    const d = await api('/api/v1/config/servers');
    renderConfigList(d.servers);
  } catch(e) {
    addLog(`获取配置列表失败: ${e.message}`, 'ERROR');
  }
}

function renderConfigList(servers) {
  const container = document.getElementById('config-list');
  if (!servers || Object.keys(servers).length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">暂无服务器配置</div>';
    return;
  }

  container.innerHTML = '';
  for (const [id, config] of Object.entries(servers)) {
    const item = document.createElement('div');
    item.className = 'config-item';
    item.innerHTML = `
      <div class="config-info">
        <div class="config-name">${config.name}</div>
        <div class="config-id">${id}</div>
      </div>
      <div class="config-actions">
        <button class="config-btn toggle ${config.enabled ? 'active' : 'inactive'}"
                onclick="toggleServer('${id}', ${!config.enabled})"
                title="${config.enabled ? '禁用' : '启用'}">
          ${config.enabled ? '✓' : '✕'}
        </button>
        <button class="config-btn" onclick="editConfig('${id}')" title="编辑">✏️</button>
        <button class="config-btn" onclick="deleteConfig('${id}')" title="删除">🗑️</button>
      </div>
    `;
    container.appendChild(item);
  }
}

function showConfigModal(editMode = false, serverId = null) {
  const modal = document.getElementById('config-modal');
  const title = document.getElementById('modal-title');
  const form = document.getElementById('config-form');

  // 重置表单
  form.reset();
  document.getElementById('config-edit-mode').value = editMode ? 'edit' : 'add';
  document.getElementById('config-id').disabled = editMode;

  if (editMode && serverId) {
    // 编辑模式 - 填充表单
    title.textContent = '编辑服务器';
    // 获取服务器详情
    api('/api/v1/config/servers').then(d => {
      const config = d.servers[serverId];
      if (config) {
        document.getElementById('config-id').value = serverId;
        document.getElementById('config-name').value = config.name;
        document.getElementById('config-desc').value = config.description || '';
        document.getElementById('config-module').value = config.module;
        document.getElementById('config-prefix').value = config.prefix || '';
        document.getElementById('config-tags').value = (config.tags || []).join(',');
        document.getElementById('config-enabled').checked = config.enabled;
      }
    });
  } else {
    // 添加模式
    title.textContent = '添加服务器';
  }

  modal.classList.add('active');
}

function closeConfigModal() {
  document.getElementById('config-modal').classList.remove('active');
}

async function submitConfig() {
  const form = document.getElementById('config-form');
  if (!form.checkValidity()) {
    toast('请填写所有必填项', 'warning');
    return;
  }

  const editMode = document.getElementById('config-edit-mode').value === 'edit';
  const serverId = document.getElementById('config-id').value.trim();
  const config = {
    name: document.getElementById('config-name').value.trim(),
    description: document.getElementById('config-desc').value.trim(),
    module: document.getElementById('config-module').value.trim(),
    prefix: document.getElementById('config-prefix').value.trim(),
    tags: document.getElementById('config-tags').value.split(',').map(t => t.trim()).filter(t => t),
    enabled: document.getElementById('config-enabled').checked
  };

  try {
    if (editMode) {
      await api(`/api/v1/config/servers/${serverId}`, 'PUT', config);
      addLog(`服务器配置已更新: ${serverId}`, 'SUCCESS');
      toast('配置已更新', 'success');
    } else {
      await api(`/api/v1/config/servers?server_id=${encodeURIComponent(serverId)}`, 'POST', config);
      addLog(`新服务器已添加: ${serverId}`, 'SUCCESS');
      toast('服务器已添加', 'success');
    }
    closeConfigModal();
    fetchConfigList();
    setTimeout(() => refreshAll(), 500);
  } catch(e) {
    addLog(`操作失败: ${e.message}`, 'ERROR');
    toast(`操作失败: ${e.message}`, 'error');
  }
}

function editConfig(id) {
  showConfigModal(true, id);
}

async function toggleServer(id, enabled) {
  try {
    await api(`/api/v1/config/servers/${id}/toggle?enabled=${enabled}`, 'PATCH');
    addLog(`服务器 ${id} 已${enabled ? '启用' : '禁用'}`, 'SUCCESS');
    toast(`已${enabled ? '启用' : '禁用'}: ${id}`, 'success');
    fetchConfigList();
    setTimeout(() => refreshAll(), 500);
  } catch(e) {
    addLog(`操作失败: ${e.message}`, 'ERROR');
    toast(`操作失败: ${e.message}`, 'error');
  }
}

async function deleteConfig(id) {
  if (!confirm(`确定要删除服务器 "${id}" 吗？此操作不可恢复。`)) {
    return;
  }

  try {
    await api(`/api/v1/config/servers/${id}`, 'DELETE');
    addLog(`服务器已删除: ${id}`, 'SUCCESS');
    toast('服务器已删除', 'success');
    fetchConfigList();
    setTimeout(() => refreshAll(), 500);
  } catch(e) {
    addLog(`删除失败: ${e.message}`, 'ERROR');
    toast(`删除失败: ${e.message}`, 'error');
  }
}

// ── performance monitoring ─────────────────────
async function fetchPerformance() {
  try {
    const d = await api('/api/v1/system/resources');
    document.getElementById('perf-cpu').textContent = d.hub.cpu_percent + '%';
    document.getElementById('perf-memory').textContent = d.hub.memory_mb + ' MB';
    document.getElementById('perf-ports').textContent =
      `${d.port_pool.allocated_count}/${d.port_pool.total_ports}`;
    document.getElementById('perf-processes').textContent =
      `${d.processes.running_processes}/${d.processes.total_processes}`;
  } catch(e) {
    // 静默失败，不显示错误
  }
}

// ── export config ─────────────────────────────
async function exportConfig() {
  try {
    const d = await api('/api/v1/system/export');
    const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mcp-hub-config-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    addLog('配置已导出', 'SUCCESS');
    toast('配置已导出', 'success');
  } catch(e) {
    addLog(`导出失败: ${e.message}`, 'ERROR');
    toast(`导出失败: ${e.message}`, 'error');
  }
}
